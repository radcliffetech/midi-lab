<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Browser Drum Pad</title>
  <script type="module" src="/src/drum-pad.ts"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #fff;
      color: #000;
    }
    .pad-grid {
      display: grid;
      grid-template-columns: repeat(4, 80px);
      grid-gap: 10px;
      justify-content: center;
      margin-top: 50px;
    }
    .pad {
      width: 80px;
      height: 80px;
      background-color: #e0e0e0;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      color: #333;
      transition: background 0.2s, color 0.2s;
    }
    .pad:hover {
      background-color: #d0d0d0;
    }
    .pad:active {
      background-color: #0d6efd;
      color: #fff;
    }
    .midi-output-select {
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand" href="/index.html">MIDI Live Tools</a>
    </div>
  </nav>
<div class="container text-center">
  
  <h1 class="mt-4">Browser Drum Pad</h1>

  <div class="midi-output-select">
    <label for="outputSelect" class="form-label">MIDI Output Device:</label>
    <select id="outputSelect" class="form-select w-auto mx-auto"></select>
  </div>

  <div id="pad-grid" class="pad-grid">
    <!-- Pads generated by JS -->
  </div>
</div>

</body>
</html>
